<!DOCTYPE html>
<html>
<head>
  <title>Smart Trading App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: 80px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      color: #111827;
    }
    p {
      color: #4b5563;
      font-size: 18px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #ff444f;
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .warning {
      margin-top: 30px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Trading App</h1>
    <p>
      A simple web platform for Deriv API login, trading dashboard, and account access.
    </p>

    <a class="btn" href="/callback">Test Callback Page</a>

    <p class="warning">
      Trading involves risk. This platform does not guarantee profits.
    </p>
  </div>
<!-- rebuild pages -->  
</body>
</html>
